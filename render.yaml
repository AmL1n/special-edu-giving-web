# Render Blueprint
# 文档：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: special-edu-giving-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python download_media.py
    startCommand: |
      python seed.py
      gunicorn -w 4 -b 0.0.0.0:5000 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin2026
      - key: UI_PREVIEW
        value: "1"
