{% extends "base.html" %}

{% block title %}{{ '编辑' if item else '新增' }}捐赠 - 特殊学校公益平台{% endblock %}

{% block content %}
<section class="section">
  <div class="container-narrow">
    <div class="section-header">
      <p class="eyebrow">{{ '编辑' if item else '新增' }}捐赠</p>
      <h1 style="font-size:var(--text-h2);">{{ item.item_name if item else '新增捐赠记录' }}</h1>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.edit_donation', donation_id=item.id) if item else url_for('admin.new_donation') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="form-group">
            <label class="form-label" for="school_id">接收学校 *</label>
            <select class="form-select" id="school_id" name="school_id" required>
              <option value="">请选择学校</option>
              {% for school in schools %}
                <option value="{{ school.id }}" {% if item and item.school_id == school.id %}selected{% endif %}>{{ school.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="donor_name">捐赠人姓名 *</label>
            <input type="text" class="form-control" id="donor_name" name="donor_name" value="{{ item.donor_name if item else '' }}" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="donor_avatar">捐赠人头像</label>
            <input type="text" class="form-control image-url-input" id="donor_avatar" name="donor_avatar" value="{{ item.donor_avatar if item else '' }}" placeholder="可输入图片地址或点击下方上传">
            <input type="file" class="image-upload-input" data-target="donor_avatar" accept="image/png,image/jpg,image/jpeg,image/gif,image/webp" style="margin-top:var(--space-3);">
            <img id="preview_donor_avatar" class="image-preview" src="{{ item.donor_avatar if item else '' }}" alt="" style="margin-top:var(--space-3);max-width:120px;max-height:120px;object-fit:cover;border-radius:50%;border:1px solid var(--border-light);display:{{ 'block' if item and item.donor_avatar else 'none' }};">
          </div>

          <div class="form-group">
            <label class="form-label" for="item_name">捐赠物品 *</label>
            <input type="text" class="form-control" id="item_name" name="item_name" value="{{ item.item_name if item else '' }}" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="item_detail">物品详情</label>
            <textarea class="form-textarea" id="item_detail" name="item_detail" rows="4">{{ item.item_detail if item else '' }}</textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="quantity">数量 / 规格</label>
            <input type="text" class="form-control" id="quantity" name="quantity" value="{{ item.quantity if item else '' }}">
          </div>

          <div class="form-group">
            <label class="form-label" for="amount">捐赠金额（元）</label>
            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ '%.2f'|format(item.amount) if item and item.amount else '' }}">
          </div>

          <div class="form-group">
            <label class="form-label" for="received_class">接收班级</label>
            <input type="text" class="form-control" id="received_class" name="received_class" value="{{ item.received_class if item else '' }}">
          </div>

          <div class="form-group">
            <label class="form-label" for="status">当前状态</label>
            <select class="form-select" id="status" name="status">
              <option value="received" {% if item and item.status == 'received' %}selected{% endif %}>已接收</option>
              <option value="distributing" {% if item and item.status == 'distributing' %}selected{% endif %}>分发中</option>
              <option value="completed" {% if item and item.status == 'completed' %}selected{% endif %}>已完成</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="distributed_at">分发完成时间</label>
            <input type="datetime-local" class="form-control" id="distributed_at" name="distributed_at" value="{{ item.distributed_at.strftime('%Y-%m-%dT%H:%M') if item and item.distributed_at else '' }}">
          </div>

          <div class="btn-group" style="margin-top:var(--space-8);">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('admin.list_donations') }}" class="btn btn-secondary">取消</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
